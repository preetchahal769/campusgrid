name: Build Android APK

on:
  push:
    branches: [ "android-main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target API Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies (Ignore Windows Lockfile)
      run: rm -f package-lock.json && npm install

    - name: Determine API URL
      id: set-api
      run: |
        if [ "${{ github.event.inputs.environment }}" = "production" ]; then
          echo "API_URL=${{ secrets.PROD_API_URL }}" >> $GITHUB_ENV
        else
          echo "API_URL=${{ secrets.STAGING_API_URL }}" >> $GITHUB_ENV
        fi

    - name: Build Next.js Export
      env:
        NEXT_PUBLIC_API_URL: ${{ env.API_URL }}
      run: MOBILE_BUILD=true npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build Android APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
