name: CampusGrid Frontend — CI/CD Pipeline

# Triggers on every push to main.
# Staging deploys automatically. Production requires manual approval.
on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/preetchahal769/campusgrid

jobs:
  # ───────────────────────────────────────────────────────────────
  # JOB 1 — Build testing image (smoke test — never pushed)
  # Runs on every push to main to catch build-breaking changes early.
  # ───────────────────────────────────────────────────────────────
  build-testing:
    name: 🧪 Build Testing Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build testing-env (verify only — not pushed)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: testing-env
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────
  # JOB 2 — Build & push staging image to GHCR
  # Tagged as :staging-{git-sha} — every deploy is commit-traceable.
  # ───────────────────────────────────────────────────────────────
  build-staging:
    name: 📦 Build & Push Staging Image
    runs-on: ubuntu-latest
    needs: build-testing
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate Image Tag
        id: tag
        run: echo "value=staging-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & Push Staging Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: staging-env
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to staging server via SSH
  # Pulls the new image and restarts only the frontend service.
  # Production is not touched.
  # ───────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-staging
    steps:
      - name: SSH into staging server & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u preetchahal769 --password-stdin
            cd /opt/campusgrid
            docker system prune -a -f --volumes 2>/dev/null || true
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.build-staging.outputs.image_tag }}
            export FRONTEND_TAG=${{ needs.build-staging.outputs.image_tag }}
            echo "FRONTEND_TAG=${FRONTEND_TAG}" > /opt/campusgrid/.frontend-tag
            docker compose up -d --no-deps --force-recreate frontend
            docker system prune -f
            echo "✅ Staging frontend deployed: ${FRONTEND_TAG}"

  # ───────────────────────────────────────────────────────────────
  # JOB 4 — Manual approval gate
  # Workflow pauses here. Go to Actions → Review deployments → Approve.
  # Requires the 'production' GitHub Environment to be configured
  # with at least one required reviewer.
  # ───────────────────────────────────────────────────────────────
  approve-production:
    name: ✋ Approve Production Deploy
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Approval granted — proceeding to production build
        run: echo "Production deployment approved for commit ${{ github.sha }}"

  # ───────────────────────────────────────────────────────────────
  # JOB 5 — Build & push production image to GHCR
  # Built from the exact same commit SHA as staging.
  # Uses PROD_API_URL (baked in) instead of STAGING_API_URL.
  # ───────────────────────────────────────────────────────────────
  build-production:
    name: 📦 Build & Push Production Image
    runs-on: ubuntu-latest
    needs: approve-production
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate Image Tag
        id: tag
        run: echo "value=prod-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production-env
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────
  # JOB 6 — Deploy to production server via SSH
  # Uses a completely separate SSH key from staging (PROD_SSH_KEY).
  # Staging is not touched.
  # ───────────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-production
    steps:
      - name: SSH into production server & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u preetchahal769 --password-stdin
            cd /opt/campusgrid
            docker system prune -a -f --volumes 2>/dev/null || true
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.build-production.outputs.image_tag }}
            export FRONTEND_TAG=${{ needs.build-production.outputs.image_tag }}
            echo "FRONTEND_TAG=${FRONTEND_TAG}" > /opt/campusgrid/.frontend-tag
            docker compose up -d --no-deps --force-recreate frontend
            docker system prune -f
            echo "✅ Production frontend deployed: ${FRONTEND_TAG}"
